<style>

  /* uhh i read somewhere this typa shit fixes firefox issues*/
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:             #3b4252;
    --bg-deep:        #2e3440;
    --bg-deeper:      #242933; /* uhh this aint in nord color pallete but its the bg of the nord website*/
    --border:         #5e81ac;
    --tab-active-bg:  #434c5e;
    --text:           #eceff4;
    --text-dim:       #e5e9f0;
    --text-muted:     #d8dee9;
    --text-on-active: #eceff4;
    --accent:         #5e81ac;
    --tabbar-h:       36px;
    --omnibox-h:      36px;
  }


/* actual content*/
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Readex Pro', sans-serif;
    color: var(--text);
  }

  #app {
    display: grid;
    grid-template-rows: var(--tabbar-h) var(--omnibox-h) 1fr;
    height: 100vh;
    position: relative;
    z-index: 1;
  }


  #sidebar {
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: row;
    align-items: center;
    overflow: hidden;
    z-index: 10;
  }

  #tab-list {
    flex: 1;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    flex-direction: row;
    scrollbar-width: none;
  }

  #tab-list::-webkit-scrollbar { display: none; } /* apparently that one kid at bsa who used a proxy to watch yt shorts on his phone still exists*/

  .tab-item, #add-tab-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    cursor: pointer;
    border: none;
    border-right: 1px solid var(--border);
    height: var(--tabbar-h);
    min-width: 120px;
    max-width: 200px;
    text-align: left;
    font-family: 'Readex Pro', sans-serif;
    background: transparent;
    flex-shrink: 0;
  }

  .tab-item.active {
    background: var(--tab-active-bg);
  }

  .tab-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-top: 1px;
  }

  .tab-icon img {
    width: 14px;
    height: 14px;
    display: block;
  }

  .tab-icon i {
    font-size: 11px;
    color: var(--text-dim);
  }

  .tab-item.active .tab-icon i { color: var(--accent); }

  .tab-title {
    flex: 1;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-dim);
  }

  .tab-item.active .tab-title {
    color: var(--text-on-active);
    font-weight: 600;
  }

  .tab-close {
    width: 16px;
    height: 16px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    opacity: 0;
    font-size: 10px;
  }

  .tab-item:hover .tab-close { opacity: 1; }
  .tab-item.active .tab-close { color: var(--accent); opacity: 0; }
  .tab-item.active:hover .tab-close { opacity: 1; }

  #add-tab-btn {
    min-width: unset;
    max-width: unset;
    padding: 0 12px;
    border-right: none;
    font-size: 12px;
    flex-shrink: 0;
  }

  #add-tab-btn .tab-icon i {
    font-size: 11px;
    color: var(--text-dim);
  }


  #content {
    position: relative;
    background: transparent;
    overflow: hidden;
  }

  .iframe-pane {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
  }

  /* }, a reminder of the hard dsay fought against my laptop keyboard */

  .iframe-pane.visible {
    pointer-events: all;
  }

  .iframe-pane iframe {
    width: 100%;
    height: 100%;
    border: none;
  }


  .newtab-overlay {
    position: absolute;
    inset: 0;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    overflow: hidden;
  }

  .newtab-overlay.hidden {
    display: none;
  }


  .newtab-center {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(-20%);
    width: 100%;
  }

  .newtab-overlay input[type=text] {
    width: 100%;
    max-width: 480px;
    padding: 10px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Readex Pro', sans-serif;
    font-size: 14px;
    outline: none;
  }

  .newtab-overlay input[type=text]::placeholder { color: var(--text-muted); }
  .newtab-overlay input[type=text]:focus { border-color: var(--accent); }

  .shortcut-row {
    display: flex;
    gap: 12px;
    margin-top: 14px;
  }

  .shortcut-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text-muted);
    font-family: 'Readex Pro', sans-serif;
    font-size: 11px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s, transform 0.15s;
  }

  .shortcut-btn:hover {
    border-color: var(--accent);
    color: var(--text);
    transform: scale(1.08);
  }

  .shortcut-btn img {
    width: 20px;
    height: 20px;
    display: block;
  }

  #omnibox {
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 4px;
    z-index: 10;
  }

  #omnibox button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px 7px;
    font-size: 13px;
    line-height: 1;
  }
  #omnibox button:hover { color: var(--text); }
  #omnibox button:disabled { opacity: 0.3; cursor: default; }

  #omnibox-input {
    flex: 1;
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'Readex Pro', sans-serif;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 10px;
    outline: none;
  }
  #omnibox-input:focus { border-color: var(--accent); }

  #no-tabs {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: none;
  }

  #no-tabs-icon {
    font-size: 48px;
    color: var(--accent);
  }

  #no-tabs-hint {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
  }
</style>

<script>
  const { animate } = Motion;

  let tabs = [];
  let activeId = null;
  let idCounter = 0;
  let searchEngine = "https://search.brave.com/search?q=?q="
  const tabList = document.getElementById('tab-list'); // why dont js and html/css just share naming conventions broskino
  const content = document.getElementById('content');
  const noTabs = document.getElementById('no-tabs');
  const addBtn = document.getElementById('add-tab-btn');
  const omniInput = document.getElementById('omnibox-input');
  const omniBack = document.getElementById('omni-back');
  const omniFwd = document.getElementById('omni-fwd');

  function getDisplayUrl(proxyUrl) {
    if (!proxyUrl) return '';
    if (proxyUrl.startsWith('./404.html?q=')) {
      try { return decodeURIComponent(proxyUrl.slice('./404.html?q='.length)); } catch(e) {}
    }
    return proxyUrl;
  }

  function navigateTo(tab, proxyUrl) {
    // truncate url
    tab.history.splice(tab.histIdx + 1);
    tab.history.push(proxyUrl);
    tab.histIdx = tab.history.length - 1;
    tab.iframe.style.display = '';
    tab.iframe.src = proxyUrl;
    tab.url = proxyUrl;
    if (tab.id === activeId) updateOmnibox();
  }

  function updateOmnibox() { //sybau now david bazucki
    const tab = tabs.find(t => t.id === activeId);
    const omnibox = document.getElementById('omnibox');
    const app = document.getElementById('app');
    if (!tab) {
      omniInput.value = ''; omniBack.disabled = true; omniFwd.disabled = true;
      omnibox.style.display = 'none';
      app.style.gridTemplateRows = 'var(--tabbar-h) 1fr';
      return;
    }
    omnibox.style.display = '';
    app.style.gridTemplateRows = '';
    omniInput.value = getDisplayUrl(tab.url);
    omniBack.disabled = tab.histIdx <= 0;
    omniFwd.disabled = tab.histIdx >= tab.history.length - 1;
  }

  omniBack.addEventListener('click', () => {
    const tab = tabs.find(t => t.id === activeId);
    if (!tab || tab.histIdx <= 0) return;
    tab.histIdx--;
    tab.url = tab.history[tab.histIdx];
    tab.iframe.src = tab.url;
    updateOmnibox();
  });

  omniFwd.addEventListener('click', () => {
    const tab = tabs.find(t => t.id === activeId);
    if (!tab || tab.histIdx >= tab.history.length - 1) return;
    tab.histIdx++;
    tab.url = tab.history[tab.histIdx];
    tab.iframe.src = tab.url;
    updateOmnibox();
  });

  omniInput.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter' || !omniInput.value.trim()) return;
    const tab = tabs.find(t => t.id === activeId);
    if (!tab) return;
    const proxyUrl = resolveInput(omniInput.value.trim());
    tab.title = omniInput.value.trim();
    tab.searched = true;
    const overlay = document.getElementById('overlay-' + tab.id);
    if (overlay) overlay.style.display = 'none';
    navigateTo(tab, proxyUrl);
    updateTabs();
  });

  function resolveInput(input) {
    if (/^[^\s]+\.[^\s]+/.test(input)) {
      const withProtocol = /^https?:\/\//i.test(input) ? input : 'https://' + input;
      return './404.html?q=' + encodeURIComponent(withProtocol);
    }
    return './404.html?q=' + encodeURIComponent(searchEngine + encodeURIComponent(input));
  }

  function createNewTabOverlay(tabThing) {
    const overlay = document.createElement('div');
    overlay.id = 'overlay-' + tabThing.id;
    overlay.className = 'newtab-overlay';

    const input = document.createElement('input');
    input.id = 'search-' + tabThing.id;
    input.type = 'text';
    input.placeholder = 'search the web freely'; // ohhh lowercase text is so tuff gng

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) {
        const query = input.value.trim();
        const proxyUrl = resolveInput(query); // fixed

        tabThing.title = query;
        tabThing.searched = true;

        overlay.style.display = 'none';
        navigateTo(tabThing, proxyUrl);

        updateTabs();
      }
    });

    //const logo = document.createElement('img');
    //logo.src = '/squalllogo.png';
    //logo.style.cssText = 'width:100%;max-width:480px;height:auto;margin-bottom:24px;';

    const center = document.createElement('div');
    center.className = 'newtab-center';
    //center.appendChild(logo);
    center.appendChild(input);

    const shortcuts = [
      { label: 'apps', url: './apps.html', fa: 'fa-solid fa-table-cells' },
      { label: 'games', url: './games.html', fa: 'fa-solid fa-gamepad' },
      { label: 'settings', url: './settings.html', fa: 'fa-solid fa-gear' },
    ];

    const row = document.createElement('div');
    row.className = 'shortcut-row';

    shortcuts.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'shortcut-btn';

      const iconEl = Object.assign(document.createElement('i'), { className: s.fa, style: 'font-size:20px' });

      const label = document.createElement('span');
      label.textContent = s.label;

      btn.appendChild(iconEl);
      btn.appendChild(label);
      btn.addEventListener('click', () => {
        const proxyUrl = (s.url === './games.html' || s.url === './apps.html' || s.url === './settings.html') ? s.url : './404.html?q=' + encodeURIComponent(s.url);
        tabThing.title = s.label;
        tabThing.searched = true;
        overlay.style.display = 'none';
        navigateTo(tabThing, proxyUrl);
        updateTabs();
      });

      row.appendChild(btn);
    });

    center.appendChild(row);
    overlay.appendChild(center);
    tabThing.focusSearch = () => document.getElementById('search-' + tabThing.id)?.focus();

    return overlay;
  }

  function buildTabEl(tab) {
    const el = document.createElement('div');
    el.id = 'tab-' + tab.id;
    el.className = 'tab-item' + (tab.id === activeId ? ' active' : '');

    const tabicon = document.createElement('div');
    tabicon.id = 'tab-icon-' + tab.id;
    tabicon.className = 'tab-icon';
    tabicon.innerHTML = '<i class="fa-solid fa-globe"></i>'; // we love font aweseome

    const titleEl = document.createElement('span');
    titleEl.id = 'tab-title-' + tab.id;
    titleEl.className = 'tab-title';
    titleEl.textContent = tab.title;

    const closeBtn = document.createElement('button');
    closeBtn.id = 'tab-close-' + tab.id;
    closeBtn.className = 'tab-close';
    closeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>'; // fontawesome is best
    closeBtn.title = 'close tab';
    closeBtn.addEventListener('click', e => { e.stopPropagation(); closeTab(tab.id); });

    el.appendChild(tabicon);
    el.appendChild(titleEl);
    el.appendChild(closeBtn);
    el.addEventListener('click', () => setActive(tab.id));
    return el;
  }

  function updateTabs() {
    tabs.forEach(tab => {
      if (!tab.el) return;
      tab.el.className = 'tab-item' + (tab.id === activeId ? ' active' : '');

      const titleEl = document.getElementById('tab-title-' + tab.id);
      if (titleEl) titleEl.textContent = tab.title;

      const iconEl = document.getElementById('tab-icon-' + tab.id);
      if (iconEl) {
        iconEl.innerHTML = '<i class="fa-solid fa-globe"></i>'; // WE glaze fontawesome
      }
    });
  }

  function createTab() {
    const id = ++idCounter;

    const pane = document.createElement('div');
    pane.id = 'pane-' + id;
    pane.className = 'iframe-pane';

    const iframe = document.createElement('iframe');
    iframe.id = 'iframe-' + id;
    iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation');
    iframe.setAttribute('credentialless', '');
    iframe.style.display = 'none';
    pane.appendChild(iframe);

    const tabThing = { id, url: null, title: 'new tab', pane, iframe, searched: false, focusSearch: null, el: null, history: [], histIdx: -1 };

    const overlay = createNewTabOverlay(tabThing);
    pane.appendChild(overlay);
    content.appendChild(pane);

    // animate new tab overlay w/ apps and stuff in
    const searchInput = pane.querySelector('input[type=text]');
    const shortcutRow = pane.querySelector('.shortcut-row');
    if (searchInput) animate(searchInput, { opacity: [0, 1], y: [18, 0] }, { duration: 0.35, easing: 'ease-out', delay: 0.05 });
    if (shortcutRow) animate(shortcutRow, { opacity: [0, 1], y: [18, 0] }, { duration: 0.35, easing: 'ease-out', delay: 0.15 });

    const el = buildTabEl(tabThing);
    tabThing.el = el;
    tabs.push(tabThing);
    tabList.appendChild(el);

    // animate tab moving in
    animate(el, { opacity: [0, 1], x: [-10, 0] }, { duration: 0.18, easing: 'ease-out' });

    setActive(id);
  }

  function closeTab(id) {
    const idx = tabs.findIndex(t => t.id === id);
    if (idx === -1) return;

    const tab = tabs[idx];
    tabs.splice(idx, 1);

    if (activeId === id) {
      activeId = null;
      if (tabs.length > 0) setActive(tabs[Math.max(0, idx - 1)].id);
    }
    updateTabs();
    updateEmpty();

    // FLIP: capture positions before removal
    const pane = document.getElementById('pane-' + id);
    if (pane) pane.style.pointerEvents = 'none';
    const oldPositions = new Map();
    tabs.forEach(t => {
      if (t.el) oldPositions.set(t.el, t.el.getBoundingClientRect().left);
    });

    // pull closing tab out of flow and animate it offscreen
    tab.el.style.position = 'absolute';
    tab.el.style.left = tab.el.getBoundingClientRect().left + 'px';
    tab.el.style.top = '0';
    tab.el.style.zIndex = '0';
    animate(tab.el, { opacity: [1, 0], y: [0, -40] }, { duration: 0.2, easing: 'ease-in' });

    // now remaining tabs reflow — animate them from old position to new
    requestAnimationFrame(() => {
      tabs.forEach(t => {
        if (!t.el || !oldPositions.has(t.el)) return;
        const oldLeft = oldPositions.get(t.el);
        const newLeft = t.el.getBoundingClientRect().left;
        const delta = oldLeft - newLeft;
        if (Math.abs(delta) > 0.5) {
          animate(t.el, { x: [delta, 0] }, { duration: 0.2, easing: 'ease-out' });
        }
      });
    });

    setTimeout(() => {
      tab.el.remove();
      pane?.remove();
    }, 220);
  }

  function setActive(id) {
    activeId = id;
    tabs.forEach(t => {
      const pane = document.getElementById('pane-' + t.id);
      if (!pane) return;
      if (t.id === id) {
        pane.style.opacity = '0';
        pane.style.pointerEvents = 'all';
        animate(pane, { opacity: [0, 1] }, { duration: 0.15, easing: 'ease-out' });
      } else {
        pane.style.pointerEvents = 'none';
        pane.style.opacity = '0';
      }
    });

    const tab = tabs.find(t => t.id === id);
    if (tab && !tab.searched && tab.focusSearch) {
      setTimeout(() => tab.focusSearch(), 50);
    }

    updateTabs();
    updateEmpty();
    updateOmnibox();
  }

  let noTabsTimer = null;
  function updateEmpty() {
    if (tabs.length === 0) {
      if (noTabsTimer) clearTimeout(noTabsTimer);
      noTabsTimer = setTimeout(() => {
        noTabs.style.display = 'flex';
        noTabs.style.opacity = '0';
        animate(noTabs, { opacity: [0, 1], y: [10, 0] }, { duration: 0.3, easing: 'ease-out' });
      }, 200);
    } else {
      if (noTabsTimer) { clearTimeout(noTabsTimer); noTabsTimer = null; }
      noTabs.style.display = 'none';
    }
  }


  addBtn.addEventListener('click', () => createTab());
  createTab();
  updateEmpty();
  updateOmnibox();

  window.addEventListener('message', (e) => {
    if (e.data?.type === 'theme-change') {
      applyTheme(e.data.theme || localStorage.getItem('theme'));
      return;
    }
    console.log('[index] title received:', e.data, 'from ', e.origin);
    if (e.data?.type !== 'tab-title') return;
    const tab = tabs.find(t => t.iframe.contentWindow === e.source);
    console.log('[index] source match:', tab ? `tab ${tab.id}` : 'no match', '| tabs:', tabs.map(t => t.id));
    if (!tab) return;
    tab.title = e.data.title;
    updateTabs();
  });
</script>

</body>
</html>
