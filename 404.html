<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail - Scramjet</title>
    <script src="./sail/baremux/index.js"></script>
    <script src="./sail/scram/scramjet.all.js"></script>
    <script>
        navigator.serviceWorker.register("./sail/sw.js")
    </script>
</head>
<body>
    <style>
        iframe {
            height: 100vh;
            width: 100vw;
            background: #cfcfcf;
            position: absolute;
            left: 0;
            top: 0;
        }
    </style>

    <iframe src="" frameborder="0" id="frame"></iframe>

    <script>
        const connection = new BareMux.BareMuxConnection("./sail/baremux/worker.js")
        connection.setTransport("./sail/libcurl/index.mjs", [{ websocket: "wss://monaco-edu.online/wisp/" }])

        const frame = document.getElementById("frame")

        const { ScramjetController } = $scramjetLoadController()
        const scramjet = new ScramjetController({
            files: {
                all: "./sail/scram/scramjet.all.js",
                wasm: "./sail/scram/scramjet.wasm.wasm",
                sync: "./sail/scram/scramjet.sync.js"
            },
            prefix: "./sail/go/"
        })
        scramjet.init()

        const params = new URLSearchParams(window.location.search)
        let url = (params.get("q") || "").trim()

        if (url) {
            if (!url.includes(".")) {
                url = "https://search.brave.com/search?q=" + encodeURIComponent(url)
            } else if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url
            }
            frame.src = scramjet.encodeUrl(url)
        }
    </script>  
    
</body>
</html>
