<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail - Scramjet</title>
    <script src="/sail/baremux/index.js"></script>
    <script src="/sail/scram/scramjet.all.js"></script>
    <script>
        navigator.serviceWorker.register("/sail/sw.js")
    </script>
</head>
<body>
    <style>
        iframe {
            height: 95vh;
            width: 100vw;
            background: #cfcfcf;
            position: absolute;
            left:0;
            bottom: 0;
        }
    </style>

    <input type="text" placeholder="url" id="bar"><button onclick="nav()">Go</button><br>
    <iframe src="" frameborder="0" id="frame"></iframe>

    <script>
        const connection = new BareMux.BareMuxConnection("/sail/baremux/worker.js")
        connection.setTransport("/sail/libcurl/index.mjs", [{ websocket: "wss://monaco-edu.online/wisp/" }])
        const bar = document.getElementById("bar")

        const { ScramjetController } = $scramjetLoadController()
        const scramjet = new ScramjetController({
            files: {
                all: "/sail/scram/scramjet.all.js",
                wasm: "/sail/scram/scramjet.wasm.wasm",
                sync: "/sail/scram/scramjet.sync.js"
            },
            prefix: "/sail/go/" // feel free to change this later
        })
        scramjet.init()

        function nav() {
            let url = bar.value.trim()
            if (!url) return;

            if (!url.includes(".")) {
                url = "https://duckduckgo.com/search?q=" + encodeURIComponent(url)
            } else if (!url.startsWith("http://") && !url.startsWith("https://")) {
                url = "https://" + url
            }

            frame.src = scramjet.encodeUrl(url)
        }

        bar.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                nav()
            }
        })

        const params = new URLSearchParams(window.location.search)
        const q = params.get("q")
        if (q) {
            bar.value = q
            nav()
        }
    </script>  
    
</body>
</html>
