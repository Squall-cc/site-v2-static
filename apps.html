<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@160..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
<link rel="stylesheet" href="glass.css">
<script src="theme.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:             #3b4252;
    --bg-deep:        #2e3440;
    --bg-deeper:      #242933;
    --border:         #5e81ac;
    --text:           #eceff4;
    --text-dim:       #e5e9f0;
    --text-muted:     #d8dee9;
    --accent:         #5e81ac;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Readex Pro', sans-serif; }

  .top-bar, .grid {
    position: relative;
    z-index: 1;
  }
  .top-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px; background: var(--bg-deep); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .top-bar h1 { font-size: 18px; font-weight: 700; margin-right: auto; }
  .top-bar input {
    padding: 8px 14px; border-radius: 10px; border: 2px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 14px; width: 220px; outline: none;
  }
  .top-bar input::placeholder { color: var(--text-muted); }
  .top-bar input:focus { border-color: var(--accent); }

  #count { font-size: 13px; color: var(--text-muted); }

  #grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 16px; padding: 24px;
    position: relative; z-index: 1;
  }

  .card {
    border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: transform .15s;
    text-decoration: none; color: inherit;
    border: 2px solid var(--border);
    position: relative;
  }
  .card:hover { transform: translateY(-4px) scale(1.05); }
  .card img {
    width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
    background: var(--bg);
  }
  .card span {
    display: block; padding: 10px 12px; font-size: 13px; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  html { scroll-behavior: auto; }
</style>
</head>
<body>

<div id="vanta-bg" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;"></div>

<div class="top-bar">
  <h1>apps</h1>
  <span id="count"></span>
  <input type="text" id="search" placeholder="Search apps..." oninput="filterApps()">
</div>

<div id="grid"></div>

<script>
  const apps = [
    { name: 'TikTok',   url: 'https://tiktok.com/',      thumbnail: '/tiktok.ico' },
    { name: 'Music',    url: 'https://monochrome.tf/',    thumbnail: '/music.png' },
    { name: 'Discord',  url: 'https://discord.com/',      thumbnail: '/discord.jpg' },
  ];

  function isLocal(url) {
    return url.startsWith('/');
  }

  function makeHref(app) {
    return isLocal(app.url) ? app.url : 'frame.html?url=' + encodeURIComponent(app.url);
  }

  function renderApps(list) {
    const grid = document.getElementById('grid');
    document.getElementById('count').textContent = list.length + ' apps';
    grid.innerHTML = '';
    list.forEach(app => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = makeHref(app);
      a.innerHTML =
        `<img src="${app.thumbnail}" alt="${app.name}" loading="lazy" onerror="this.style.display='none'">` +
        `<span>${app.name}</span>`;
      grid.appendChild(a);
    });
  }

  function filterApps() {
    const q = document.getElementById('search').value.toLowerCase();
    renderApps(apps.filter(a => a.name.toLowerCase().includes(q)));
  }

  renderApps(apps);
</script>

<script>
  function loadVanta() {
      var s = document.createElement('script');
      s.src = '/vanta-modified.js';
      s.onload = function() {
          try {
              var _vc = getVantaColors();
              window._vantaEffect = VANTA.TOPOLOGY({
                  el: "#vanta-bg",
                  mouseControls: true,
                  touchControls: true,
                  gyroControls: false,
                  minHeight: 200,
                  minWidth: 200,
                  scale: 1,
                  scaleMobile: 1,
                  color: _vc.color,
                  backgroundColor: _vc.backgroundColor,
              });
          } catch(e) { console.warn('Vanta failed to init:', e); }
      };
      document.head.appendChild(s);
  }
  function tryLoadVanta() {
    if (navigator.getBattery) {
      navigator.getBattery().then(function(b) {
        if (b.charging || b.level >= 0.25) loadVanta();
      });
    } else { loadVanta(); }
  }
  if (document.readyState === 'complete') tryLoadVanta();
  else window.addEventListener('load', tryLoadVanta);
</script>

</body>
</html>
